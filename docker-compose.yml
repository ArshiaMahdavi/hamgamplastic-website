services:
  app:
    build: .
    container_name: hamgamplastic-app
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      NODE_ENV: production

  mongodb:
    image: mongo:6.0
    container_name: hamgamplastic-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
